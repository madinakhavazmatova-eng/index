<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Миды жаттықтырайық!</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;font-family:'Nunito',sans-serif}
body{overflow:hidden}

/* ====== БАСТАПҚЫ БЕТ ====== */
#start-screen{width:100vw;height:100vh;background:linear-gradient(160deg,#a8e6cf 0%,#7fcdbb 25%,#5bc0de 50%,#4a90d9 75%,#357abd 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.brain-container{position:relative;margin-bottom:20px}
.brain-img{width:260px;height:260px;object-fit:contain;filter:drop-shadow(0 15px 35px rgba(0,0,0,0.25));animation:brainBounce 2s ease-in-out infinite}
@keyframes brainBounce{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-15px) rotate(2deg)}}
.main-title{font-size:3.2rem;font-weight:900;color:#fff;text-shadow:0 4px 15px rgba(0,0,0,0.2),0 0 40px rgba(255,255,255,0.3);margin-bottom:50px;animation:titlePulse 2.5s ease-in-out infinite}
@keyframes titlePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
.settings-panel{background:rgba(255,255,255,0.25);backdrop-filter:blur(20px);border-radius:24px;padding:35px 50px;border:2px solid rgba(255,255,255,0.4);box-shadow:0 20px 60px rgba(0,0,0,0.15);display:flex;flex-direction:column;gap:25px;min-width:380px}
.setting-row{display:flex;flex-direction:column;gap:10px}
.setting-label{font-size:1.2rem;font-weight:700;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,0.2)}
.setting-inputs{display:flex;gap:12px;align-items:center}
.setting-inputs input[type="number"]{width:90px;padding:12px 16px;border:2px solid rgba(255,255,255,0.5);border-radius:14px;background:rgba(255,255,255,0.3);color:#1a5276;font-size:1.3rem;font-weight:700;text-align:center;outline:none}
.setting-inputs span{color:rgba(255,255,255,0.9);font-weight:600;font-size:1rem}
.start-btn{margin-top:10px;padding:18px 50px;font-size:1.5rem;font-weight:900;color:#fff;background:linear-gradient(135deg,#ff6b6b 0%,#ee5a5a 50%,#d63031 100%);border:none;border-radius:18px;cursor:pointer;box-shadow:0 8px 30px rgba(214,48,49,0.4);transition:all 0.3s;letter-spacing:1px}
.start-btn:hover{transform:translateY(-3px) scale(1.02)}

/* ====== ОЙЫН БЕТІ ====== */
#game-screen{display:none;width:100vw;height:100vh;background:linear-gradient(160deg,#e8f6f3 0%,#d5f5e3 25%,#c2e0f9 50%,#aed6f1 75%,#85c1e9 100%);position:relative;overflow:hidden}
.game-header{display:flex;justify-content:space-between;align-items:center;padding:20px 40px;position:absolute;top:0;left:0;right:0;z-index:10}
.progress-box{background:rgba(255,255,255,0.7);backdrop-filter:blur(15px);border-radius:16px;padding:12px 28px;border:2px solid rgba(255,255,255,0.8);box-shadow:0 8px 25px rgba(0,0,0,0.08);font-size:1.1rem;font-weight:700;color:#1a5276}
.progress-box .current{font-size:1.6rem;color:#d63031}
.timer-box{background:rgba(255,255,255,0.7);backdrop-filter:blur(15px);border-radius:16px;padding:12px 28px;border:2px solid rgba(255,255,255,0.8);box-shadow:0 8px 25px rgba(0,0,0,0.08);font-size:1.6rem;font-weight:900;color:#1a5276;display:flex;align-items:center;gap:8px}
.timer-box.warning{background:rgba(255,200,100,0.7);animation:timerPulse 1s ease-in-out infinite}
.timer-box.danger{background:rgba(255,100,100,0.7);animation:timerPulse 0.5s ease-in-out infinite}
@keyframes timerPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.game-content{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:40px}
.cards-row{display:flex;align-items:center;justify-content:center;gap:80px}
.stimulus-card{display:flex;flex-direction:column;align-items:center;gap:15px;padding:50px 70px;background:rgba(255,255,255,0.6);backdrop-filter:blur(20px);border-radius:30px;border:3px solid rgba(255,255,255,0.8);box-shadow:0 20px 60px rgba(0,0,0,0.1);user-select:none}
.stimulus-number{font-size:8rem;font-weight:900;line-height:1;text-shadow:0 4px 15px rgba(0,0,0,0.15)}
.stimulus-hint{font-size:1.6rem;font-weight:700;color:#5d6d7e;background:rgba(255,255,255,0.5);padding:10px 25px;border-radius:10px;letter-spacing:2px}

/* ====== БАҒАЛАУ БАТЫРМАЛАРЫ ====== */
.evaluation-row{display:flex;gap:30px;align-items:center;justify-content:center;margin-top:10px}
.eval-btn{padding:16px 50px;font-size:1.3rem;font-weight:900;color:#fff;border:none;border-radius:16px;cursor:pointer;transition:all 0.3s;letter-spacing:1px;box-shadow:0 6px 20px rgba(0,0,0,0.15)}
.eval-btn:hover{transform:translateY(-3px) scale(1.02)}
.eval-btn:active{transform:translateY(0) scale(0.97)}
.correct-btn{background:linear-gradient(135deg,#22c55e 0%,#16a34a 100%);box-shadow:0 6px 20px rgba(34,197,94,0.4)}
.correct-btn:hover{box-shadow:0 10px 30px rgba(34,197,94,0.5)}
.wrong-btn{background:linear-gradient(135deg,#ef4444 0%,#dc2626 100%);box-shadow:0 6px 20px rgba(239,68,68,0.4)}
.wrong-btn:hover{box-shadow:0 10px 30px rgba(239,68,68,0.5)}

/* ====== КЕЛЕСІ БАТЫРМАСЫ ====== */
.next-btn{padding:22px 80px;font-size:1.8rem;font-weight:900;color:#fff;background:linear-gradient(135deg,#3b82f6 0%,#2563eb 100%);border:none;border-radius:24px;cursor:pointer;box-shadow:0 12px 40px rgba(59,130,246,0.4),0 4px 15px rgba(0,0,0,0.15);transition:all 0.3s;letter-spacing:2px;text-shadow:0 2px 8px rgba(0,0,0,0.2)}
.next-btn:hover{transform:translateY(-4px) scale(1.03);box-shadow:0 16px 50px rgba(59,130,246,0.5),0 6px 20px rgba(0,0,0,0.2)}
.next-btn:active{transform:translateY(0) scale(0.97)}

/* ====== НӘТИЖЕ БЕТІ ====== */
#result-screen{display:none;width:100vw;height:100vh;position:relative;overflow:hidden}
#result-success{display:none;width:100%;height:100%;background:linear-gradient(160deg,#a8e6cf 0%,#7fcdbb 25%,#5bc0de 50%,#4a90d9 100%);flex-direction:column;align-items:center;justify-content:center;position:relative}
#result-timeout{display:none;width:100%;height:100%;background:linear-gradient(160deg,#fadbd8 0%,#f5b7b1 25%,#e74c3c 50%,#c0392b 100%);flex-direction:column;align-items:center;justify-content:center;position:relative}
.result-title{font-size:5rem;font-weight:900;color:#fff;text-shadow:0 4px 20px rgba(0,0,0,0.2);animation:resultTitleAnim 0.8s ease-out 0.3s both}
@keyframes resultTitleAnim{0%{transform:translateY(30px);opacity:0}100%{transform:translateY(0);opacity:1}}
.result-stats{margin-top:30px;font-size:1.8rem;font-weight:700;color:rgba(255,255,255,0.95);text-shadow:0 2px 10px rgba(0,0,0,0.15);animation:resultTitleAnim 0.8s ease-out 0.5s both;text-align:center;line-height:2}
.restart-btn{margin-top:50px;padding:18px 50px;font-size:1.4rem;font-weight:800;color:#fff;background:rgba(255,255,255,0.25);border:2px solid rgba(255,255,255,0.6);border-radius:16px;cursor:pointer;backdrop-filter:blur(10px);transition:all 0.3s;animation:resultTitleAnim 0.8s ease-out 0.7s both}
.restart-btn:hover{background:rgba(255,255,255,0.4);transform:translateY(-3px)}

/* ====== ҮЛКЕН КУБОКТЫ МИ (СІЗДІҢ СУРЕТІҢІЗ) ====== */
.trophy-brain-img{width:380px;height:380px;object-fit:contain;filter:drop-shadow(0 20px 50px rgba(0,0,0,0.3));animation:resultBrainAnim 1s ease-out;margin-bottom:20px}
@keyframes resultBrainAnim{0%{transform:scale(0) rotate(-20deg);opacity:0}60%{transform:scale(1.1) rotate(5deg)}100%{transform:scale(1) rotate(0);opacity:1}}

/* ====== ОТ ШАШУЛАР ====== */
.firework-particle{position:absolute;width:6px;height:6px;border-radius:50%;animation:particleAnim 2.5s ease-out forwards}
@keyframes particleAnim{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--px),var(--py)) scale(0);opacity:0}}
.fade-in{animation:fadeIn 0.5s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.countdown-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:100;font-size:8rem;font-weight:900;color:#fff}
.countdown-number{animation:countPulse 0.8s ease-out}
@keyframes countPulse{0%{transform:scale(2);opacity:0}50%{transform:scale(0.9)}100%{transform:scale(1);opacity:1}}
</style>

<div>Қалған уақыт: <span id="remaining-time">00:00</span></div>
</div>
<button class="restart-btn" onclick="resetGame()">Қайта ойнау</button>
<button class="restart-btn" onclick="goHome()" style="margin-left:20px;background:rgba(255,255,255,0.15);">🏠 Басты бетке</button>
</div>
<!-- Уақыт бітті - УАҚЫТ БІТКЕНДЕ (мидың суреті ЖОҚ! Тек мәтін!) -->
<div id="result-timeout">
<h2 class="result-title">Уақыт бітті!</h2>
<div class="result-stats">
<div>Дұрыс жауап: <span id="timeout-correct">0</span></div>
<div>Қате жауап: <span id="timeout-wrong">0</span></div>
</div>
<button class="restart-btn" onclick="resetGame()">Қайта ойнау</button>
<button class="restart-btn" onclick="goHome()" style="margin-left:20px;background:rgba(255,255,255,0.15);">🏠 Басты бетке</button>
</div>
</div>

<script>
const COLORS={
red:{name:'қызыл',hex:'#e74c3c'},blue:{name:'көк',hex:'#3498db'},
green:{name:'жасыл',hex:'#2ecc71'},yellow:{name:'сары',hex:'#f1c40f'},
purple:{name:'қызғылт',hex:'#9b59b6'},orange:{name:'қызғылтсары',hex:'#e67e22'}
};
const NUMBERS=[1,2,3,4,5,6,7,8,9];
let gameState={totalTasks:10,currentTask:0,correctAnswers:0,wrongAnswers:0,timeLeft:60,timerInterval:null,evaluated:false};

function startGame(){
const count=parseInt(document.getElementById('task-count').value)||10;
const min=parseInt(document.getElementById('time-min').value)||0;
const sec=parseInt(document.getElementById('time-sec').value)||0;
gameState.totalTasks=Math.max(1,Math.min(50,count));
gameState.timeLeft=min*60+sec;
gameState.currentTask=0;gameState.correctAnswers=0;gameState.wrongAnswers=0;gameState.evaluated=false;
document.getElementById('total-progress').textContent=gameState.totalTasks;
document.getElementById('start-screen').style.display='none';
document.getElementById('game-screen').style.display='block';
document.getElementById('game-screen').classList.add('fade-in');
showCountdown(()=>{nextTask();startTimer();});
}

function showCountdown(callback){
const overlay=document.createElement('div');overlay.className='countdown-overlay';document.body.appendChild(overlay);
let count=3;const showNum=()=>{
overlay.innerHTML='<div class="countdown-number">'+(count>0?count:'БАСТАУ!')+'</div>';
if(count>0){count--;setTimeout(showNum,800);}else{setTimeout(()=>{overlay.remove();callback();},800);}
};showNum();
}

function nextTask(){
if(gameState.currentTask>=gameState.totalTasks){endGame(true);return;}
gameState.currentTask++;
gameState.evaluated=false;
document.getElementById('current-progress').textContent=gameState.currentTask;
document.getElementById('eval-row').style.display='flex';
document.getElementById('next-btn').style.display='none';
const stimuli=generateStimuli();
const isSwapped=Math.random()<0.5;
if(isSwapped){
document.getElementById('left-number').textContent=stimuli.color.number;
document.getElementById('left-number').style.color=stimuli.color.color.hex;
document.getElementById('left-hint').textContent='[түс]';
document.getElementById('right-number').textContent=stimuli.number.number;
document.getElementById('right-number').style.color=stimuli.number.color.hex;
document.getElementById('right-hint').textContent='[сан]';
}else{
document.getElementById('left-number').textContent=stimuli.number.number;
document.getElementById('left-number').style.color=stimuli.number.color.hex;
document.getElementById('left-hint').textContent='[сан]';
document.getElementById('right-number').textContent=stimuli.color.number;
document.getElementById('right-number').style.color=stimuli.color.color.hex;
document.getElementById('right-hint').textContent='[түс]';
}
}

function markAnswer(isCorrect){
if(gameState.evaluated) return;
gameState.evaluated=true;
if(isCorrect){gameState.correctAnswers++;}else{gameState.wrongAnswers++;}
document.getElementById('eval-row').style.display='none';
document.getElementById('next-btn').style.display='inline-block';
}

function generateStimuli(){
const colorKeys=Object.keys(COLORS);
const numColorKey=colorKeys[Math.floor(Math.random()*colorKeys.length)];
const number=NUMBERS[Math.floor(Math.random()*NUMBERS.length)];
let colorColorKey=colorKeys[Math.floor(Math.random()*colorKeys.length)];
let colorNumber=NUMBERS[Math.floor(Math.random()*NUMBERS.length)];
while(colorNumber===number){colorNumber=NUMBERS[Math.floor(Math.random()*NUMBERS.length)];}
return{
number:{number:number,color:COLORS[numColorKey]},
color:{number:colorNumber,color:COLORS[colorColorKey]}
};
}

function startTimer(){
updateTimerDisplay();
gameState.timerInterval=setInterval(()=>{
gameState.timeLeft--;updateTimerDisplay();
if(gameState.timeLeft<=0){clearInterval(gameState.timerInterval);endGame(false);}
},1000);
}

function updateTimerDisplay(){
const min=Math.floor(gameState.timeLeft/60);
const sec=gameState.timeLeft%60;
document.getElementById('timer-text').textContent=String(min).padStart(2,'0')+':'+String(sec).padStart(2,'0');
const timerBox=document.getElementById('timer-display');
timerBox.classList.remove('warning','danger');
if(gameState.timeLeft<=10){timerBox.classList.add('danger');}
else if(gameState.timeLeft<=30){timerBox.classList.add('warning');}
}

function endGame(completed){
clearInterval(gameState.timerInterval);
document.getElementById('game-screen').style.display='none';
document.getElementById('result-screen').style.display='block';
const min=Math.floor(gameState.timeLeft/60);
const sec=gameState.timeLeft%60;
const timeStr=String(min).padStart(2,'0')+':'+String(sec).padStart(2,'0');
if(completed){
document.getElementById('result-success').style.display='flex';
document.getElementById('result-timeout').style.display='none';
document.getElementById('correct-count').textContent=gameState.correctAnswers;
document.getElementById('wrong-count').textContent=gameState.wrongAnswers;
document.getElementById('remaining-time').textContent=timeStr;
setTimeout(()=>createFireworks(),500);
setTimeout(()=>createFireworks(),1500);
setTimeout(()=>createFireworks(),2500);
setTimeout(()=>createFireworks(),3500);
}else{
document.getElementById('result-success').style.display='none';
document.getElementById('result-timeout').style.display='flex';
document.getElementById('timeout-correct').textContent=gameState.correctAnswers;
document.getElementById('timeout-wrong').textContent=gameState.wrongAnswers;
}
}

function createFireworks(){
const colors=['#ff6b6b','#feca57','#48dbfb','#ff9ff3','#54a0ff','#5f27cd','#00d2d3','#ff9f43'];
const container=document.getElementById('result-success');
for(let i=0;i<5;i++){
setTimeout(()=>{
const x=Math.random()*window.innerWidth;
const y=Math.random()*window.innerHeight*0.7;
explodeFirework(x,y,colors);
},i*200);
}
}

function explodeFirework(x,y,colors){
const container=document.getElementById('result-success');
const particleCount=30+Math.floor(Math.random()*20);
for(let i=0;i<particleCount;i++){
const particle=document.createElement('div');
particle.className='firework-particle';
particle.style.left=x+'px';particle.style.top=y+'px';
particle.style.background=colors[Math.floor(Math.random()*colors.length)];
const angle=(Math.PI*2*i)/particleCount+(Math.random()-0.5)*0.5;
const distance=80+Math.random()*150;
const px=Math.cos(angle)*distance;
const py=Math.sin(angle)*distance;
particle.style.setProperty('--px',px+'px');
particle.style.setProperty('--py',py+'px');
container.appendChild(particle);
setTimeout(()=>particle.remove(),2500);
}
}

function resetGame(){
clearInterval(gameState.timerInterval);
document.querySelectorAll('.firework-particle').forEach(el=>el.remove());
document.getElementById('result-screen').style.display='none';
document.getElementById('result-success').style.display='none';
document.getElementById('result-timeout').style.display='none';
document.getElementById('start-screen').style.display='flex';
}
</script>
</body>
</html>

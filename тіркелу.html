<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тіркелу — ӘДІС</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0B3C5D 0%, #1C5D99 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .auth-container {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
        }
        
        .auth-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .auth-logo h1 {
            color: #0B3C5D;
            font-size: 2rem;
            font-weight: 700;
        }
        
        .auth-logo p {
            color: #7f8c8d;
            margin-top: 0.5rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #2c3e50;
            font-size: 0.9rem;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid #e5e8e8;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #0B3C5D;
            box-shadow: 0 0 0 3px rgba(11, 60, 93, 0.1);
        }
        
        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: #0B3C5D;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .submit-btn:hover {
            background: #1C5D99;
            transform: translateY(-2px);
        }
        
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: #7f8c8d;
        }
        
        .auth-footer a {
            color: #0B3C5D;
            text-decoration: none;
            font-weight: 600;
        }
        
        .auth-footer a:hover {
            text-decoration: underline;
        }
        
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1rem;
            color: #7f8c8d;
            text-decoration: none;
            font-size: 0.9rem;
        }
        
        .back-link:hover {
            color: #0B3C5D;
        }
        
        .error-message {
            background: #fee;
            color: #c33;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }
        
        .success-message {
            background: #efe;
            color: #3c3;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-logo">
        <h1>ӘДІС</h1>
        <p>Жаңа аккаунт жасау</p>
    </div>
    
    <div class="error-message" id="errorMsg"></div>
    <div class="success-message" id="successMsg"></div>
    
    <form id="registerForm">
        <div class="form-group">
            <label for="fullName">Аты-жөніңіз</label>
            <input type="text" id="fullName" required placeholder="Мысалы: Айгүл Серікқызы">
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" required placeholder="email@example.com">
        </div>
        <div class="form-group">
            <label for="password">Құпия сөз (мин. 6 таңба)</label>
            <input type="password" id="password" required minlength="6" placeholder="••••••••">
        </div>
        <div class="form-group">
            <label for="confirmPassword">Құпия сөзді растау</label>
            <input type="password" id="confirmPassword" required placeholder="••••••••">
        </div>
        <div class="form-group">
            <label for="userType">Пайдаланушы түрі</label>
            <select id="userType" required>
                <option value="">Таңдаңыз...</option>
                <option value="teacher">Мұғалім</option>
                <option value="student">Студент</option>
                <option value="intern">Практикант</option>
            </select>
        </div>
        <button type="submit" class="submit-btn" id="submitBtn">Тіркелу</button>
    </form>
    
    <div class="auth-footer">
        Аккаунт бар ма? <a href="кіру.html">Кіру</a>
    </div>
    <a href="index.html" class="back-link">← Басты бетке оралу</a>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC2NjVhAxz6o0orZsLvZO6DBpmefGWtdbs",
        authDomain: "adis11.firebaseapp.com",
        projectId: "adis11",
        storageBucket: "adis11.firebasestorage.app",
        messagingSenderId: "1076245506221",
        appId: "1:1076245506221:web:163729dc73b8bc4b957e24",
        measurementId: "G-ZDK8R92RMY"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const fullName = document.getElementById('fullName').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const btn = document.getElementById('submitBtn');
        const errorDiv = document.getElementById('errorMsg');
        const successDiv = document.getElementById('successMsg');
        
        // Тексерулер
        if (password !== confirmPassword) {
            errorDiv.textContent = 'Құпия сөздер сәйкес келмейді';
            errorDiv.style.display = 'block';
            return;
        }
        
        if (password.length < 6) {
            errorDiv.textContent = 'Құпия сөз кем дегенде 6 таңбадан тұруы керек';
            errorDiv.style.display = 'block';
            return;
        }
        
        btn.disabled = true;
        btn.textContent = 'Тіркелу...';
        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';
        
        auth.createUserWithEmailAndPassword(email, password)
            .then((userCredential) => {
                // Пайдаланушы атын сақтау
                return userCredential.user.updateProfile({
                    displayName: fullName
                });
            })
            .then(() => {
                successDiv.textContent = 'Сәтті тіркелдіңіз! Кіру бетіне өтудеміз...';
                successDiv.style.display = 'block';
                
                setTimeout(() => {
                    window.location.href = 'indexx.html';
                }, 2000);
            })
            .catch((error) => {
                let message = 'Қате орын алды';
                
                switch(error.code) {
                    case 'auth/email-already-in-use':
                        message = 'Бұл email бұрын тіркелген';
                        break;
                    case 'auth/invalid-email':
                        message = 'Email форматы дұрыс емес';
                        break;
                    case 'auth/weak-password':
                        message = 'Құпия сөз тым әлсіз';
                        break;
                }
                
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Тіркелу';
            });
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<title>ӘДІС – тіркелу беті</title>

<style>
body{
    background:#FFFFFF;
    color:#000000;
    font-family: Arial, sans-serif;
}

/* HEADER */
.header{
    width:100%;
    background:#0B3C5D;
    padding:20px;
}

/* FORM BOX */
.form-box{
    width:420px;
    margin:50px auto;
    padding:50px; /* жоғары-төмен 40px, сол-оң 50px */
    border:1px solid #ccc;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

/* INPUT SIZE */
.form-box input[type="text"],
.form-box input[type="email"],
.form-box input[type="password"],
.form-box select{
    width:100%;
    padding:12px;
    margin:8px 0;
    font-size:16px;
    border-radius:8px;
    border:1px solid #aaa;
}

/* RADIO ҚАТАРДА */
.gender-box{
    display:flex;
    gap:20px;
    margin:10px 0;
    font-size:16px;
}

/* BUTTON STYLE */
.form-box button{
    width:100%;
    padding:14px;
    background:#1C5D99;
    color:white;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}
/* Hover */
.form-box button:hover{
    background:#164a7a;
}
/* Click */
.form-box button:active{
    background:#0B3C5D;
}
</style>
</head>
<body>
<!-- HEADER -->
<table class="header">
<tr> 
<td width="90"> 
<img src="adis.png" width="80" style="border-radius:50%;">
</td>
<td>
<font color="white" size="8"><b>ÄDIS</b></font><br>
<font color="#CFE8F5">tez • jeńil • naqty</font>
</td>
</tr>
</table>

<!-- FORM -->
<div class="form-box">
<h2 align="center">Тіркелу</h2>
<form action="server.php" method="POST">

<input type="text" name="username" placeholder="Тегіңді жаз" required>
<input type="text" name="name" placeholder="Атыңды жаз" required>
<input type="email" name="email" placeholder="Email жаз" required>
<input type="password" name="pass" placeholder="Пароль жаз" required>

<!-- RADIO Ер/Әйел қатарда -->
<div class="gender-box">
<label><input type="radio" name="gender" value="male" required> Ер</label>
<label><input type="radio" name="gender" value="female"> Әйел</label>
</div>

<select name="city">
<option value="almaty">Алматы</option>
<option value="astana">Астана</option>
<option value="shymkent" selected>Шымкент</option>
<option value="aqtobe">Ақтөбе</option>
<option value="aqtau">Ақтау</option>
<option value="qyzylorda">Қызылорда</option>
<option value="qaragandy">Қарағанды</option>
<option value="pavlodar">Павлодар</option>
<option value="oral">Орал</option>
<option value="atyrau">Атырау</option>
<option value="turkistan">Түркістан</option>
<option value="taraz">Тараз</option>
<option value="oskemen">Өскемен</option>
<option value="semey">Семей</option>
<option value="qostanay">Қостанай</option>
<option value="kokshetau">Көкшетау</option>
<option value="jezqazgan">Жезқазған</option>
</select>

<button type="submit">Жіберу</button>
</form>
</div>
</body>
</html>
